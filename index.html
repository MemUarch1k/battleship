<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memuar's Battleship</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0c12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            padding: 16px;
        }

        .game-container {
            background: #0f1117;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 100%;
            overflow-x: auto;
        }

        .game-panel {
            background: #07090e;
            border-radius: 32px;
            padding: 20px;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .score-card {
            background: #0f1117;
            border-radius: 24px;
            padding: 10px 20px;
            text-align: center;
            flex: 1;
        }

        .score-label {
            color: #5a6e8a;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .score-value {
            color: #2ecc71;
            font-size: 32px;
            font-weight: bold;
        }

        .best .score-value {
            color: #f39c12;
        }

        .fields {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .field {
            background: #0f1117;
            border-radius: 20px;
            padding: 12px;
            text-align: center;
        }

        .field-title {
            color: #c0d0e6;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(10, minmax(28px, 38px));
            gap: 3px;
            background: #07090e;
            padding: 8px;
            border-radius: 16px;
        }

        .cell {
            aspect-ratio: 1 / 1;
            background: #1a1f2a;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.05s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .enemy-cell {
            background: #1a1f2a;
        }

        .enemy-cell:hover {
            background: #2a2f3e;
            transform: scale(0.95);
        }

        .player-cell {
            background: #0f1520;
            cursor: default;
        }

        .player-cell.ship {
            background: #2ecc71;
            box-shadow: inset 0 0 0 1px #1e8a4c;
        }

        .cell.hit {
            background: #e74c3c;
            box-shadow: inset 0 0 0 1px #c0392b;
        }

        .cell.miss {
            background: #5a6e8a;
            position: relative;
        }

        .cell.miss::after {
            content: "·";
            color: white;
            font-size: 16px;
            opacity: 0.8;
        }

        .cell.ship-hit {
            background: #e74c3c;
            position: relative;
        }

        .cell.ship-hit::after {
            content: "💀";
            font-size: 12px;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        button {
            background: #1a1f2a;
            border: none;
            color: #c0d0e6;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            padding: 10px 24px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #0b0e12;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0b0e12;
        }

        .status {
            text-align: center;
            margin-top: 16px;
            color: #e67e22;
            font-weight: bold;
            font-size: 16px;
            background: #0f1117;
            padding: 8px;
            border-radius: 60px;
        }

        .turn-indicator {
            background: #2c3e50;
            padding: 6px 16px;
            border-radius: 40px;
            display: inline-block;
            margin-bottom: 10px;
            font-size: 12px;
        }

        @media (max-width: 700px) {
            .grid { grid-template-columns: repeat(10, minmax(24px, 32px)); gap: 2px; }
            .cell { font-size: 9px; }
            .score-value { font-size: 24px; }
            button { font-size: 12px; padding: 8px 16px; }
        }

        @media (max-width: 550px) {
            .grid { grid-template-columns: repeat(10, minmax(22px, 28px)); }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-panel">
        <div class="score-board">
            <div class="score-card"><div class="score-label">🏆 ИГРОК</div><div class="score-value" id="playerScore">0</div></div>
            <div class="score-card best"><div class="score-label">🤖 БОТ</div><div class="score-value" id="botScore">0</div></div>
        </div>

        <div class="fields">
            <div class="field">
                <div class="field-title">🚢 ТВОИ КОРАБЛИ</div>
                <div class="grid" id="playerGrid"></div>
            </div>
            <div class="field">
                <div class="field-title">🎯 АТАКА НА БОТА</div>
                <div class="grid" id="enemyGrid"></div>
            </div>
        </div>

        <div class="controls">
            <button id="newGameBtn">🔄 НОВАЯ ИГРА</button>
            <button id="randomizeBtn">🎲 СЛУЧАЙНАЯ РАССТАНОВКА</button>
        </div>
        <div class="status" id="gameStatus">⚓ НАЧНИ ИГРУ</div>
    </div>
</div>

<script>
    (function(){
        // ========== НАСТРОЙКИ ==========
        const BOARD_SIZE = 10;
        const SHIPS = [4, 3, 3, 2, 2, 2, 1, 1, 1, 1]; // длины кораблей
        
        let playerBoard = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
        let botBoard = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
        let playerShots = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0)); // 0-не стрелял, 1-мимо, 2-попадание
        let botShots = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
        
        let playerShipsAlive = 20; // сумма длин всех кораблей
        let botShipsAlive = 20;
        let gameActive = true;
        let playerTurn = true;
        let botThinking = false;
        
        let playerScore = 0, botScore = 0;
        
        // Для ИИ бота
        let botLastHit = null;
        let botHitStack = [];
        let botTargetQueue = [];
        
        // DOM
        const playerGridEl = document.getElementById('playerGrid');
        const enemyGridEl = document.getElementById('enemyGrid');
        const playerScoreSpan = document.getElementById('playerScore');
        const botScoreSpan = document.getElementById('botScore');
        const gameStatusSpan = document.getElementById('gameStatus');
        
        // Звуки
        let audioCtx = null;
        let shootSound = null, hitSound = null, missSound = null, winSound = null, loseSound = null;
        
        function initAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                createShootSound();
                createHitSound();
                createMissSound();
                createWinSound();
                createLoseSound();
            } catch(e) {}
        }
        
        function createShootSound() {
            if (!audioCtx) return;
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < buffer.length; i++) {
                data[i] = Math.sin(880 * 2 * Math.PI * i / audioCtx.sampleRate) * Math.exp(-i / (audioCtx.sampleRate * 0.02));
            }
            shootSound = buffer;
        }
        
        function createHitSound() {
            if (!audioCtx) return;
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.25, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < buffer.length; i++) {
                let t = i / audioCtx.sampleRate;
                data[i] = Math.sin(220 * 2 * Math.PI * t) * Math.exp(-t * 8);
            }
            hitSound = buffer;
        }
        
        function createMissSound() {
            if (!audioCtx) return;
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < buffer.length; i++) {
                let t = i / audioCtx.sampleRate;
                data[i] = Math.sin(1200 * 2 * Math.PI * t) * Math.exp(-t * 15);
            }
            missSound = buffer;
        }
        
        function createWinSound() {
            if (!audioCtx) return;
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.8, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < buffer.length; i++) {
                let t = i / audioCtx.sampleRate;
                let freq = 440 + t * 440;
                data[i] = Math.sin(2 * Math.PI * freq * t) * Math.exp(-t * 3);
            }
            winSound = buffer;
        }
        
        function createLoseSound() {
            if (!audioCtx) return;
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.6, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < buffer.length; i++) {
                let t = i / audioCtx.sampleRate;
                let freq = 220 - t * 100;
                data[i] = Math.sin(2 * Math.PI * freq * t) * Math.exp(-t * 5);
            }
            loseSound = buffer;
        }
        
        function playSound(buffer) {
            if (!audioCtx || !buffer) return;
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            source.start();
        }
        
        function unlockAudio() {
            if (audioCtx && audioCtx.state !== 'running') audioCtx.resume();
        }
        document.body.addEventListener('click', unlockAudio);
        document.body.addEventListener('touchstart', unlockAudio);
        
        // ========== РАССТАНОВКА КОРАБЛЕЙ ==========
        function canPlaceShip(board, x, y, length, horizontal) {
            for (let i = -1; i <= length; i++) {
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        let nx = x + (horizontal ? i : dx);
                        let ny = y + (horizontal ? dx : i);
                        if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
                            if (board[ny][nx] === 1) return false;
                        }
                    }
                }
            }
            for (let i = 0; i < length; i++) {
                let nx = x + (horizontal ? i : 0);
                let ny = y + (horizontal ? 0 : i);
                if (board[ny][nx] === 1) return false;
            }
            return true;
        }
        
        function placeShip(board, x, y, length, horizontal) {
            for (let i = 0; i < length; i++) {
                let nx = x + (horizontal ? i : 0);
                let ny = y + (horizontal ? 0 : i);
                board[ny][nx] = 1;
            }
        }
        
        function randomPlacement(board) {
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    board[i][j] = 0;
                }
            }
            for (let ship of SHIPS) {
                let placed = false;
                for (let attempt = 0; attempt < 500 && !placed; attempt++) {
                    let horizontal = Math.random() < 0.5;
                    let x = Math.floor(Math.random() * (BOARD_SIZE - (horizontal ? ship : 0)));
                    let y = Math.floor(Math.random() * (BOARD_SIZE - (horizontal ? 0 : ship)));
                    if (canPlaceShip(board, x, y, ship, horizontal)) {
                        placeShip(board, x, y, ship, horizontal);
                        placed = true;
                    }
                }
                if (!placed) {
                    randomPlacement(board);
                    return;
                }
            }
        }
        
        // ========== ОТРИСОВКА ==========
        function render() {
            // Поле игрока
            playerGridEl.innerHTML = '';
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell player-cell';
                    if (playerBoard[y][x] === 1) cell.classList.add('ship');
                    if (botShots[y][x] === 1) cell.classList.add('miss');
                    if (botShots[y][x] === 2) cell.classList.add('ship-hit');
                    playerGridEl.appendChild(cell);
                }
            }
            
            // Поле бота (вражеское)
            enemyGridEl.innerHTML = '';
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell enemy-cell';
                    if (playerShots[y][x] === 1) cell.classList.add('miss');
                    if (playerShots[y][x] === 2) {
                        cell.classList.add('hit');
                        if (botBoard[y][x] === 1) cell.classList.add('ship-hit');
                    }
                    if (gameActive && playerTurn && playerShots[y][x] === 0 && botBoard[y][x] !== 2) {
                        cell.style.cursor = 'pointer';
                        cell.onclick = (function(xx, yy) { return () => playerAttack(xx, yy); })(x, y);
                    }
                    enemyGridEl.appendChild(cell);
                }
            }
        }
        
        // ========== АТАКА ==========
        function playerAttack(x, y) {
            if (!gameActive || !playerTurn || botThinking) return;
            if (playerShots[y][x] !== 0) return;
            
            playSound(shootSound);
            
            if (botBoard[y][x] === 1) {
                // Попадание
                playerShots[y][x] = 2;
                botShipsAlive--;
                playSound(hitSound);
                gameStatusSpan.innerHTML = `🎯 ПОПАДАНИЕ! (${x+1}, ${y+1})`;
                
                if (botShipsAlive === 0) {
                    gameActive = false;
                    playerScore++;
                    updateScores();
                    playSound(winSound);
                    gameStatusSpan.innerHTML = "🏆 ПОБЕДА! 🏆";
                    render();
                    return;
                }
                render();
                // Игрок ходит ещё раз
                setTimeout(() => {}, 100);
            } else {
                // Мимо
                playerShots[y][x] = 1;
                playSound(missSound);
                gameStatusSpan.innerHTML = `💧 МИМО! (${x+1}, ${y+1}) Ход бота...`;
                render();
                playerTurn = false;
                setTimeout(() => botAttack(), 600);
            }
            render();
        }
        
        // ========== БОТ С УМНЫМ ИИ ==========
        function botAttack() {
            if (!gameActive || playerTurn || botThinking) return;
            botThinking = true;
            
            setTimeout(() => {
                let target = null;
                
                // Сначала стреляем по сохранённым целям
                if (botTargetQueue.length > 0) {
                    target = botTargetQueue.shift();
                } else if (botLastHit) {
                    // Добавляем соседние клетки вокруг последнего попадания
                    let dirs = [[0,1],[0,-1],[1,0],[-1,0]];
                    for (let d of dirs) {
                        let nx = botLastHit.x + d[0];
                        let ny = botLastHit.y + d[1];
                        if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE && botShots[ny][nx] === 0) {
                            botTargetQueue.push({x: nx, y: ny});
                        }
                    }
                    if (botTargetQueue.length > 0) target = botTargetQueue.shift();
                }
                
                // Если нет целей — случайный выстрел
                if (!target) {
                    let freeCells = [];
                    for (let y = 0; y < BOARD_SIZE; y++) {
                        for (let x = 0; x < BOARD_SIZE; x++) {
                            if (botShots[y][x] === 0) freeCells.push({x, y});
                        }
                    }
                    if (freeCells.length > 0) target = freeCells[Math.floor(Math.random() * freeCells.length)];
                }
                
                if (target) {
                    playSound(shootSound);
                    
                    if (playerBoard[target.y][target.x] === 1) {
                        botShots[target.y][target.x] = 2;
                        playerShipsAlive--;
                        playSound(hitSound);
                        gameStatusSpan.innerHTML = `🤖 Бот попал! (${target.x+1}, ${target.y+1})`;
                        botLastHit = target;
                        
                        if (playerShipsAlive === 0) {
                            gameActive = false;
                            botScore++;
                            updateScores();
                            playSound(loseSound);
                            gameStatusSpan.innerHTML = "💀 ПОРАЖЕНИЕ... 💀";
                            render();
                            botThinking = false;
                            return;
                        }
                        render();
                        botThinking = false;
                        // Бот ходит ещё раз
                        setTimeout(() => botAttack(), 400);
                    } else {
                        botShots[target.y][target.x] = 1;
                        playSound(missSound);
                        gameStatusSpan.innerHTML = `🤖 Бот промахнулся! Твой ход`;
                        botLastHit = null;
                        botTargetQueue = [];
                        render();
                        playerTurn = true;
                        botThinking = false;
                    }
                }
                render();
            }, 300);
        }
        
        function updateScores() {
            playerScoreSpan.innerText = playerScore;
            botScoreSpan.innerText = botScore;
            try {
                localStorage.setItem('battleship_scores', JSON.stringify({player: playerScore, bot: botScore}));
            } catch(e) {}
        }
        
        function loadScores() {
            try {
                const saved = localStorage.getItem('battleship_scores');
                if (saved) {
                    const scores = JSON.parse(saved);
                    playerScore = scores.player || 0;
                    botScore = scores.bot || 0;
                    playerScoreSpan.innerText = playerScore;
                    botScoreSpan.innerText = botScore;
                }
            } catch(e) {}
        }
        
        function resetGame() {
            playerBoard = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
            botBoard = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
            playerShots = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
            botShots = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
            
            randomPlacement(playerBoard);
            randomPlacement(botBoard);
            
            playerShipsAlive = 20;
            botShipsAlive = 20;
            gameActive = true;
            playerTurn = true;
            botThinking = false;
            botLastHit = null;
            botHitStack = [];
            botTargetQueue = [];
            
            gameStatusSpan.innerHTML = "⚓ ТВОЙ ХОД! СТРЕЛЯЙ!";
            render();
        }
        
        function randomizePlayer() {
            if (!gameActive) return;
            playerBoard = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
            randomPlacement(playerBoard);
            render();
            gameStatusSpan.innerHTML = "🔄 КОРАБЛИ ПЕРЕСТАВЛЕНЫ!";
            setTimeout(() => {
                if (gameActive && playerTurn) gameStatusSpan.innerHTML = "⚓ ТВОЙ ХОД!";
            }, 1500);
        }
        
        function newGame() {
            resetGame();
        }
        
        function setupEvents() {
            document.getElementById('newGameBtn').addEventListener('click', () => newGame());
            document.getElementById('randomizeBtn').addEventListener('click', () => randomizePlayer());
        }
        
        function start() {
            loadScores();
            initAudio();
            setupEvents();
            resetGame();
        }
        
        start();
    })();
</script>
</body>
</html>
